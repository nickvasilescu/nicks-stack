      auto_prune: true
      retention_days: 7
      delete_orphans: true
      min_interval_hours: 24
    file_read_max_chars: 100000
    tool_output:
      max_bytes: 50000
      max_lines: 2000
      max_line_length: 2000
    tool_loop_guardrails:
      warnings_enabled: true
      hard_stop_enabled: false
      warn_after:
        exact_failure: 2
        same_tool_failure: 3
        idempotent_no_progress: 2
      hard_stop_after:
        exact_failure: 5
        same_tool_failure: 8
        idempotent_no_progress: 5
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
      hygiene_hard_message_limit: 400
      protect_first_n: 3
      abort_on_summary_failure: false
      codex_gpt55_autoraise: true
    prompt_caching:
      cache_ttl: 5m
    openrouter:
      response_cache: true
      response_cache_ttl: 300
      min_coding_score: 0.65
    bedrock:
      region: ''
      discovery:
        enabled: true
        provider_filter: []
        refresh_interval: 3600
      guardrail:
        guardrail_identifier: ''
        guardrail_version: ''
        stream_processing_mode: async
        trace: disabled
    auxiliary:
      vision:
        provider: auto
        model: ''
