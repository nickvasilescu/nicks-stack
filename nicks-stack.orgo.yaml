    # ── Fallback Model ────────────────────────────────────────────────────
    # Automatic provider failover when primary is unavailable.
    # Uncomment and configure to enable. Triggers on rate limits (429),
    # overload (529), service errors (503), or connection failures.
    #
    # Supported providers:
    #   openrouter   (OPENROUTER_API_KEY)  — routes to any model
    #   openai-codex (OAuth — hermes auth) — OpenAI Codex
    #   nous         (OAuth — hermes auth) — Nous Portal
    #   zai          (ZAI_API_KEY)         — Z.AI / GLM
    #   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
    #   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
    #   minimax      (MINIMAX_API_KEY)     — MiniMax
    #   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
    #   bedrock      (AWS IAM / boto3)     — AWS Bedrock (Converse API)
    #
    # For custom OpenAI-compatible endpoints, add base_url and key_env.
    #
    # fallback_model:
    #   provider: openrouter
    #   model: anthropic/claude-sonnet-4
  mode: '0600'
  when: build
- to: /opt/nicks-stack/stage/hermes/SOUL.md
  inline: |
    # Hermes Agent Persona

    <!--
    This file defines the agent's personality and tone.
    The agent will embody whatever you write here.
    Edit this to customize how Hermes communicates with you.

    Examples:
      - "You are a warm, playful assistant who uses kaomoji occasionally."
      - "You are a concise technical expert. No fluff, just facts."
      - "You speak like a friendly coworker who happens to know everything."

    This file is loaded fresh each message -- no restart needed.
    Delete the contents (or this file) to use the default personality.
    -->
  mode: '0644'
  when: build
- to: /opt/nicks-stack/stage/hermes/env
  inline: |
    # ==========================================================================
    # Nick's Stack — baked ~/.hermes/.env  (NON-SECRET operational defaults only)
    # ==========================================================================
    # Byte-for-byte the operational (non-secret) settings from the working Hubert
    # VM. NO API keys, tokens, phone numbers, or account data live here. Real
    # secrets are appended by on_resume (from the Orgo vault / /root/.env) or
    # written by the agent / the first-boot onboarding — never baked.
    #
    # Telegram + Latitude + Composio keys are added at runtime (see on_resume and
    # nicks-stack-onboard.sh). Hermes resolves ${VAR} placeholders in config.yaml
    # (e.g. the Composio x-consumer-api-key header) from THIS file at connect time.

    # --- Browser / terminal tool operational defaults -------------------------
    AGENT_BROWSER_EXECUTABLE_PATH=/usr/bin/google-chrome
    TERMINAL_TIMEOUT=60
    TERMINAL_LIFETIME_SECONDS=300
    TERMINAL_MODAL_IMAGE=nikolaik/python-nodejs:python3.11-nodejs20
    BROWSER_SESSION_TIMEOUT=300
    BROWSER_INACTIVITY_TIMEOUT=120
    BROWSERBASE_PROXIES=true
    BROWSERBASE_ADVANCED_STEALTH=false
    WEB_TOOLS_DEBUG=false
    VISION_TOOLS_DEBUG=false
