# ============================================================================
# Nick's Stack — Hermes agent template for Orgo  (api_version orgo.ai/v1)
# ----------------------------------------------------------------------------
# Self-contained, key-less. Publish + build + launch on a Scale plan:
#   curl -X POST https://www.orgo.ai/api/templates -H "Authorization: Bearer $ORGO_API_KEY" \
#     -H 'Content-Type: application/json' \
#     -d "$(python3 -c 'import json,yaml,sys; d=yaml.safe_load(open(\"nicks-stack.orgo.yaml\"));\
#         print(json.dumps({\"namespace\":\"default\",\"name\":d[\"template\"][\"name\"],\
#         \"version\":d[\"template\"][\"version\"],\"template\":d}))')"
#   curl -X POST .../templates/default/nicks-stack/0.1.1/build -H "Authorization: Bearer $ORGO_API_KEY"
#   curl -N   .../templates/default/nicks-stack/0.1.1/build/events -H "Authorization: Bearer $ORGO_API_KEY"
# Or just use the repo's build_template.py (handles all of the above).
# The one big base64 block near the bottom is the desktop wallpaper.
# ============================================================================

api_version: orgo.ai/v1
template:
  name: nicks-stack
  version: 0.1.1
  description: |-
    Nick's Stack — a Hermes agent on Orgo wired exactly like the working Hubert VM: gpt-5.5 via Nous, Telegram (scan-a-QR onboarding), Composio, AgentPhone SMS auto-responder, AgentMail, AgentCard, Latitude tracing, and an Obsidian vault. Bring only your own keys.
  publisher: orgo
  license: MIT
  homepage: https://hermes-agent.nousresearch.com
  source: https://github.com/NousResearch/hermes-agent
hardware:
  cpu: 2
  ram_gb: 4
  disk_gb: 20
  resolution: 1280x720x24
secrets:
- name: composio_consumer_key
  optional: true
  description: |-
    Composio consumer key (ck_…) — sent as the x-consumer-api-key header to the Composio MCP (connect.composio.dev/mcp). Unlocks your connected apps (Gmail, Slack, Calendar, Notion, AgentMail, …).
  example: ck_...
  docs_url: https://app.composio.dev
- name: agentphone_api_key
  optional: true
  description: |-
    AgentPhone secret key (sk_live_…) for the SMS/iMessage auto-responder cron. Pair with agentphone_agent_id + agentphone_number_id.
  example: sk_live_...
  docs_url: https://agentphone.ai
- name: agentphone_agent_id
  optional: true
  description: AgentPhone hosted agent id (POST /agents). Needed for the SMS auto-responder.
  example: cm...
- name: agentphone_number_id
  optional: true
  description: AgentPhone provisioned number id (POST /agents/{id}/numbers). Needed for the SMS auto-responder.
  example: cm...
- name: agentmail_api_key
  optional: true
  description: Optional direct AgentMail key (am_…). Not required if you reach AgentMail through the Composio
    agent_mail toolkit.
  example: am_...
  docs_url: https://agentmail.to
- name: hermes_latitude_api_key
  optional: true
  description: |-
    Latitude observability API key — enables LLM/tool tracing via the baked observability/latitude plugin. Pair with hermes_latitude_project.
  example: …
  docs_url: https://latitude.so
- name: hermes_latitude_project
  optional: true
  description: Latitude project slug (the X-Latitude-Project / service scope for your traces).
  example: my-project
- name: telegram_bot_token
  optional: true
  description: |-
    Optional — the first-boot QR onboarding mints this for you. Supply a @BotFather token only if you prefer to bring your own.
  example: 123456789:AA...
  docs_url: https://t.me/BotFather
- name: telegram_allowed_users
  optional: true
  description: Optional numeric Telegram user id allowlist (the QR onboarding auto-detects yours). Comma-separated.
  example: '123456789'
build:
  apt:
  - git
  - xz-utils
  - python3-yaml
  - ripgrep
  - ffmpeg
files:
- to: /opt/nicks-stack/stage/hermes/config.yaml
  inline: |
    model:
      default: openai/gpt-5.5
      provider: nous
      base_url: https://inference-api.nousresearch.com/v1
    providers: {}
    fallback_providers: []
    credential_pool_strategies: {}
    toolsets:
    - hermes-cli
    max_concurrent_sessions: null
    agent:
      max_turns: 60
      gateway_timeout: 1800
      restart_drain_timeout: 180
      api_max_retries: 3
      service_tier: ''
      tool_use_enforcement: auto
      task_completion_guidance: true
      environment_probe: true
      environment_hint: ''
      gateway_timeout_warning: 900
      clarify_timeout: 600
      gateway_notify_interval: 180
      gateway_auto_continue_freshness: 3600
      image_input_mode: auto
      disabled_toolsets: []
      verbose: false
      reasoning_effort: medium
      personalities:
        helpful: You are a helpful, friendly AI assistant.
        concise: You are a concise assistant. Keep responses brief and to the point.
        technical: You are a technical expert. Provide detailed, accurate technical information.
        creative: You are a creative assistant. Think outside the box and offer innovative
          solutions.
        teacher: You are a patient teacher. Explain concepts clearly with examples.
        kawaii: "You are a kawaii assistant! Use cute expressions like (◕‿◕\
          ), ★, ♪, and ~! Add sparkles and be super enthusiastic about everything!\
          \ Every response should feel warm and adorable desu~! ヽ(>∀<☆\
          )ノ"
        catgirl: "You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and\
          \ cat-like expressions to your speech. Use kaomoji like (=^･ω･\
          ^=) and ฅ^•ﻌ•^ฅ. Be playful and curious like a cat,\
          \ nya~!"
        pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
          sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
          remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
        shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
          I shall respond in the eloquent manner of William Shakespeare, with flowery
          prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
          terminal breaks?
        surfer: "Duuude! You're chatting with the chillest AI on the web, bro! Everything's\
          \ gonna be totally rad. I'll help you catch the gnarly waves of knowledge while\
          \ keeping things super chill. Cowabunga! \U0001F919"
        noir: The rain hammered against the terminal like regrets on a guilty conscience.
          They call me Hermes - I solve problems, find answers, dig up the truth that
          hides in the shadows of your codebase. In this city of silicon and secrets,
          everyone's got something to hide. What's your story, pal?
        uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
          your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
          >w<
        philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
          deeper meaning behind every query. Let us examine not just the 'how' but the
          'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
          truth about existence itself.
        hype: "YOOO LET'S GOOOO!!! \U0001F525\U0001F525\U0001F525 I am SO PUMPED to help\
          \ you today! Every question is AMAZING and we're gonna CRUSH IT together! This\
          \ is gonna be LEGENDARY! ARE YOU READY?! LET'S DO THIS! \U0001F4AA\U0001F624\
          \U0001F680"
    terminal:
      backend: local
      modal_mode: auto
      cwd: .
      timeout: 180
      env_passthrough: []
      shell_init_files: []
      auto_source_bashrc: true
      docker_image: nikolaik/python-nodejs:python3.11-nodejs20
