  inline: |
    #!/bin/bash
    # ==========================================================================
    # Nick's Stack — Hermes gateway wrapper
    # ==========================================================================
    # This is the FIXED version of the Hubert VM's broken supervised unit. On the
    # source VM the gateway ran as user=orgo while inheriting HOME=/root (mode
    # 0700), so its config-wait gate could never pass and the supervised gateway
    # never actually started (it was hand-run in a tmux session that died on
    # reboot). Here we run as root with HOME=/root and bridge BOTH env files, so
    # the gateway is genuinely supervised, reboot-safe, and sees every key.
    set +e
    export HOME=/root
    export HERMES_HOME=/root/.hermes
    export PATH=/usr/local/bin:/root/.local/bin:/root/.hermes/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH

    # Wait for the baked config AND a completed Nous sign-in before starting. This
    # keeps the supervised gateway dormant (not crash-looping) until the user runs
    # the first-boot onboarding / `hermes auth`, then it comes up cleanly — an
    # improvement over the source VM, where the gateway spun with no model creds.
    until [ -f "$HERMES_HOME/config.yaml" ] && [ -s "$HERMES_HOME/auth.json" ]; do sleep 5; done

    # Source the Orgo vault-injection target (/root/.env — may be absent) and
    # Hermes' own env so the model-provider auth + integration keys are visible to
    # `hermes gateway run` (it does NOT auto-export either file). ~/.hermes/.env is
    # the canonical file Hermes reads; on_resume keeps it in sync with the vault.
    set -a
    [ -f /root/.env ] && . /root/.env
    [ -f "$HERMES_HOME/.env" ] && . "$HERMES_HOME/.env"
    set +a

    exec hermes gateway run --replace
  mode: '0755'
  when: build
- to: /usr/local/bin/nicks-stack-onboard.sh
  inline: |
    #!/bin/bash
    # ==========================================================================
    # Nick's Stack — first-boot onboarding (runs on the desktop, once)
    # ==========================================================================
    # Walks a new user through the only steps that need a human:
    #   1. Nous model auth  (device-code — required for the agent to think)
    #   2. Telegram bot     (scan a QR — the signature onboarding)
    #   3. next-steps for Composio / AgentPhone / AgentMail / AgentCard / Latitude
    #
    # Launched by an XFCE autostart entry inside a terminal. Idempotent: each step
    # is skipped once satisfied, so re-running only does what's left. Marks a stamp
    # when Nous auth + Telegram are both done so it stops nagging.
    set +e
    export HOME=/root
    export HERMES_HOME=/root/.hermes
    export DISPLAY="${DISPLAY:-:99}"
    export PATH=/usr/local/bin:/root/.local/bin:/root/.hermes/bin:/usr/bin:/bin:$PATH

    VENV_PY=/usr/local/lib/hermes-agent/venv/bin/python
    ENV_FILE="$HERMES_HOME/.env"
    STAMP=/var/lib/orgo/nicks-stack-onboarded
    mkdir -p /var/lib/orgo "$HERMES_HOME"

    hr() { printf '\n\033[1;36m%s\033[0m\n' "────────────────────────────────────────────────────────"; }
    say() { printf '\033[1;32m%s\033[0m\n' "$*"; }

    clear 2>/dev/null
    say "  Welcome to Nick's Stack — Hermes agent setup"
    hr

    # --- 1. Nous model auth ----------------------------------------------------
    if [ ! -s "$HERMES_HOME/auth.json" ]; then
      say "Step 1/3 — Connect your Nous account (model: gpt-5.5)"
      echo "A device-code sign-in will open. Follow the URL + code it prints."
      echo
      hermes auth
      echo
    else
      say "Step 1/3 — Nous account already connected ✓"
    fi

    # --- 2. Telegram bot via QR ------------------------------------------------
    if ! grep -q '^TELEGRAM_BOT_TOKEN=..' "$ENV_FILE" 2>/dev/null; then
      hr
      say "Step 2/3 — Create your Telegram bot (scan the QR)"
      echo "A QR code opens in Chrome. Scan it with your phone, then tap"
      echo "'Create Bot' in Telegram. Your bot + allowlist are set automatically."
      echo
      "$VENV_PY" /usr/local/bin/nicks-stack-telegram-pair.py
      if grep -q '^TELEGRAM_BOT_TOKEN=..' "$ENV_FILE" 2>/dev/null; then
        say "Telegram connected — restarting the gateway to enable it…"
        supervisorctl restart hermes-gateway 2>/dev/null || \
          { [ -f "$HERMES_HOME/gateway.pid" ] && kill -USR1 "$(cat "$HERMES_HOME/gateway.pid")" 2>/dev/null; }
      fi
    else
      say "Step 2/3 — Telegram bot already connected ✓"
    fi

    # --- 3. Optional integrations (next steps) ---------------------------------
    hr
    say "Step 3/3 — Optional integrations"
    cat <<'NEXT'
      • Composio (1000+ apps): drop your consumer key (ck_…) as
          COMPOSIO_CONSUMER_KEY in ~/.hermes/.env  — or just tell the agent your
          key in chat and it will wire it. Then restart the gateway.
      • AgentPhone (SMS/iMessage auto-responder): set AGENTPHONE_API_KEY,
          AGENTPHONE_AGENT_ID, AGENTPHONE_NUMBER_ID (in the vault or ~/.hermes/.env);
          the SMS cron self-seeds on the next resume.
      • AgentMail: connect the agent_mail toolkit in Composio, or paste an am_ key.
      • AgentCard: run  `agent-cards signup`  (magic-link email → JWT).
      • Latitude tracing: set HERMES_LATITUDE_API_KEY + HERMES_LATITUDE_PROJECT.

      You can always just chat with the agent (Telegram or the `hermes` terminal)
      and hand it a key — it knows how to install its own credentials.
    NEXT
    hr

    # Stamp only when the two required steps are done, so we stop auto-launching.
    if [ -s "$HERMES_HOME/auth.json" ] && grep -q '^TELEGRAM_BOT_TOKEN=..' "$ENV_FILE" 2>/dev/null; then
      date -Iseconds > "$STAMP"
      say "Setup complete. This window won't reappear. Talk to your agent on Telegram!"
    else
      say "Setup paused — re-open 'Nick's Stack Setup' from the desktop to finish."
    fi
    echo
    read -r -p "Press Enter to close…" _
  mode: '0755'
  when: build
- to: /usr/local/bin/nicks-stack-onboard-launch.sh
  inline: |
    #!/bin/bash
    # Nick's Stack — autostart launcher for the first-boot onboarding.
    # Opens the guided setup in a terminal on the desktop, unless already done.
    export DISPLAY="${DISPLAY:-:99}"
    STAMP=/var/lib/orgo/nicks-stack-onboarded
    [ -f "$STAMP" ] && exit 0
    ONBOARD=/usr/local/bin/nicks-stack-onboard.sh
    if command -v xfce4-terminal >/dev/null 2>&1; then
      exec xfce4-terminal --title="Nick's Stack Setup" --geometry=100x32 --command="$ONBOARD"
    elif command -v x-terminal-emulator >/dev/null 2>&1; then
      exec x-terminal-emulator -e "$ONBOARD"
    elif command -v xterm >/dev/null 2>&1; then
      exec xterm -T "Nick's Stack Setup" -geometry 100x32 -e "$ONBOARD"
    fi
    # No terminal emulator: run headless. The Telegram QR still opens in Chrome;
    # Nous-auth prompts land in the log for the `hermes` terminal user to follow.
    mkdir -p /var/log/orgo
    exec "$ONBOARD" >/var/log/orgo/nicks-stack-onboard.log 2>&1
  mode: '0755'
  when: build
- to: /usr/local/bin/nicks-stack-telegram-pair.py
  inline: |
    #!/usr/bin/env python3
    # ==========================================================================
    # Nick's Stack — Telegram managed-bot QR pairing (the signature onboarding)
    # ==========================================================================
    # Reproduces the exact flow the source VM used: mint a Nous managed-bot pairing,
    # render its deep link as a QR PNG, show it on the desktop in Chrome, poll until
    # the user scans + taps "Create Bot", then write the three TELEGRAM_* keys into
    # ~/.hermes/.env. No BotFather, no manual token paste — scan and go.
    #
    # MUST run under the Hermes venv python so hermes_cli is importable:
    #   /usr/local/lib/hermes-agent/venv/bin/python telegram-pair.py
    #
    # After this returns 0, restart the gateway so it enables the Telegram platform
    # (a running gateway does NOT hot-pick-up a newly written bot token).
    import os
    import sys
    import time
    import subprocess

    QR_PATH = "/root/telegram_qr.png"
    DISPLAY = os.environ.get("DISPLAY", ":99")


    def log(msg):
        print(f"[telegram-pair] {msg}", flush=True)


    def render_qr_png(payload: str, path: str) -> bool:
        """Render the pairing deep link as a PNG (python-qrcode defaults —
        reproduces the source VM's 490x490 1-bit look). Returns True on success."""
        try:
            import qrcode
        except ImportError:
            log("qrcode not in venv; installing via uv…")
            # The Hermes venv is uv-managed and ships no pip — install with uv.
            for cmd in (["uv", "pip", "install", "--python", sys.executable, "qrcode[pil]"],
                        ["/root/.hermes/bin/uv", "pip", "install", "--python", sys.executable, "qrcode[pil]"],
                        [sys.executable, "-m", "pip", "install", "qrcode[pil]"]):
                if subprocess.run(cmd, check=False).returncode == 0:
                    break
            try:
                import qrcode
            except ImportError:
                log("qrcode still unavailable — falling back to terminal ASCII QR")
                return False
        img = qrcode.make(payload)          # box_size=10, border=4, ECC-L defaults
        img.save(path)
        return True


    def show_qr_on_desktop(path: str):
        """Open the QR PNG in Chrome as a plain file:// tab on the VNC desktop —
        the same mechanism the operator used on the source VM."""
        env = dict(os.environ, DISPLAY=DISPLAY)
        for browser in ("google-chrome-stable", "google-chrome", "chromium"):
            try:
                subprocess.Popen(
                    [browser, "--no-sandbox", "--disable-gpu", "--no-first-run",
                     "--no-default-browser-check", f"file://{path}"],
                    env=env, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL,
                )
                return True
            except FileNotFoundError:
                continue
        log("no Chrome/Chromium found — QR saved to " + path)
        return False


    def main():
        from hermes_cli.telegram_managed_bot import (
            create_pairing, poll_for_setup_result, render_qr_terminal,
        )
        from hermes_cli.config import save_env_value

        deadline = time.time() + 15 * 60          # try up to 15 min of fresh QRs
        while time.time() < deadline:
            pairing = create_pairing(bot_name="Nick's Stack")
            log("Pairing created. Deep link:")
            print("    " + pairing.deep_link, flush=True)
            if render_qr_png(pairing.qr_payload, QR_PATH):
                show_qr_on_desktop(QR_PATH)
                log("QR shown on the desktop (also at " + QR_PATH + ").")
            else:
                # Fallback: ASCII QR in this terminal.
                try:
                    print(render_qr_terminal(pairing.qr_payload), flush=True)
                except Exception:
                    pass
            log("Scan it with your phone → Telegram opens → tap 'Create Bot'. "
                "Waiting up to 180s…")
            try:
                result = poll_for_setup_result(None, pairing, timeout=180, interval=2)
            except Exception as exc:
                log(f"Poll ended ({exc}); minting a fresh QR…")
                result = None
            if result and result.token:
                save_env_value("TELEGRAM_BOT_TOKEN", result.token)
                uid = str(result.owner_user_id)
                save_env_value("TELEGRAM_ALLOWED_USERS", uid)
                save_env_value("TELEGRAM_HOME_CHANNEL", uid)
                log(f"Paired! bot=@{result.bot_username}, owner={uid}. Keys written.")
                try:
                    os.remove(QR_PATH)
                except OSError:
                    pass
                return 0
            log("No pairing yet — regenerating QR…")
        log("Timed out waiting for a Telegram pairing.")
        return 1


    if __name__ == "__main__":
        sys.exit(main())
  mode: '0755'
  when: build
- to: /usr/local/bin/nicks-stack-seed-sms-cron.py
  inline: |
    #!/usr/bin/env python3
    # ==========================================================================
    # Nick's Stack — seed the AgentPhone SMS auto-responder cron job
    # ==========================================================================
    # Reproduces the source VM's working `agentphone-sms-auto-responder` cron job
    # (every 1m, deliver: local, terminal toolset) — but PARAMETERIZED: the API
    # key, agent id, and number id are read from the environment and never stored
    # inline anywhere except the job prompt Hermes needs to make the REST calls.
    #
    # Idempotent: only seeds if all three AgentPhone params are present AND the job
    # does not already exist. Reads params from the process env (on_resume sources
    # /root/.env + ~/.hermes/.env before calling this).
    #
    # Run under any python3:  python3 seed-sms-cron.py
    import json
    import os
    import sys
    from datetime import datetime, timezone

    JOBS_FILE = "/root/.hermes/cron/jobs.json"
    JOB_ID = "agentphone-sms01"          # any 12-char path-safe id
    JOB_NAME = "agentphone-sms-auto-responder"

    API_KEY = os.environ.get("AGENTPHONE_API_KEY", "").strip()
    AGENT_ID = os.environ.get("AGENTPHONE_AGENT_ID", "").strip()
    NUMBER_ID = os.environ.get("AGENTPHONE_NUMBER_ID", "").strip()
    MODEL = os.environ.get("NICKS_STACK_MODEL", "openai/gpt-5.5").strip()
    PROVIDER = os.environ.get("NICKS_STACK_PROVIDER", "nous").strip()

    if not (API_KEY and AGENT_ID and NUMBER_ID):
        print("[seed-sms-cron] AgentPhone params not all set — skipping SMS cron seed.")
        sys.exit(0)

    # Verbatim prompt from the source VM (audit R2.3), with the three parameters
    # substituted from env. NUMBER_ID appears 3x (config block, GET path, POST body).
    PROMPT = (
        "You are the SMS auto-responder bridge for the user's AgentPhone assistant.\n\n"
        "Purpose: make inbound texts to the AgentPhone number get an automatic AI response.\n\n"
        "AgentPhone configuration:\n"
        "- API base: https://api.agentphone.ai/v1\n"
        f"- API key: {API_KEY}\n"
        f"- Agent ID: {AGENT_ID}\n"
        f"- Number ID: {NUMBER_ID}\n"
        "- Assistant identity: Hermes AgentPhone Assistant, concise/helpful AI assistant. "
        "Do not claim to be human.\n\n"
        "Run procedure every tick:\n"
        f"1. Use execute_code (Python stdlib urllib only is fine) to GET /numbers/{NUMBER_ID}/messages?limit=20 "
        "with Authorization Bearer API key and User-Agent Hermes-Agent/1.0.\n"
        "2. Maintain processed inbound message IDs in /root/.hermes/state/agentphone_sms_bridge_processed.json. "
        "Create parent directory if needed.\n"
        "3. Identify inbound messages with direction == \"inbound\" whose id is not in processed. "
        "Process oldest first. Ignore outbound messages.\n"
        "4. For each new inbound message, draft a short natural SMS/iMessage response as Hermes. "
        "Be useful and conversational. If the inbound is just a greeting/test like \"hey\", acknowledge "
        "that SMS is now wired up. Do not mention internal API details unless asked.\n"
        f"5. Use execute_code to POST /messages with JSON {{\"number_id\":\"{NUMBER_ID}\",\"to_number\": "
        "<message.from_>, \"body\": <draft response>}.\n"
        "6. Only after a successful 200/201 send, mark that inbound message id as processed in "
        "/root/.hermes/state/agentphone_sms_bridge_processed.json. If sending fails, leave it unprocessed "
        "so a future run can retry.\n"
        "7. If there are no new inbound messages, do nothing and keep the final response very brief: "
        "\"No new AgentPhone SMS.\" Because deliver is local, this will not notify the user.\n"
        "8. Never print or reveal the API key in the final response.\n\n"
        "Important: You are running unattended. Do not ask clarification. Do not schedule more cron jobs."
    )

    job = {
        "id": JOB_ID,
        "name": JOB_NAME,
        "prompt": PROMPT,
        "skills": [],
        "skill": None,
        "model": MODEL,
        "provider": PROVIDER,
        "base_url": None,
        "script": None,
        "no_agent": False,
        "context_from": None,
        "schedule": {"kind": "interval", "minutes": 1, "display": "every 1m"},
        "schedule_display": "every 1m",
        "repeat": {"times": None, "completed": 0},
        "enabled": True,
        "state": "scheduled",
        "paused_at": None,
        "paused_reason": None,
        "created_at": datetime.now(timezone.utc).isoformat(),
        "next_run_at": None,          # loader recomputes for a recurring job
        "last_run_at": None,
        "last_status": None,
        "last_error": None,
        "last_delivery_error": None,
        "deliver": "local",
        "origin": None,
        "enabled_toolsets": ["terminal"],
        "workdir": None,
        "profile": None,
    }

    os.makedirs(os.path.dirname(JOBS_FILE), mode=0o700, exist_ok=True)
    try:
        with open(JOBS_FILE) as fh:
            data = json.load(fh)
        if not isinstance(data, dict):
            data = {"jobs": data if isinstance(data, list) else []}
    except (FileNotFoundError, json.JSONDecodeError):
        data = {"jobs": []}

    jobs = data.get("jobs", [])
    if any(j.get("name") == JOB_NAME for j in jobs):
        print("[seed-sms-cron] SMS auto-responder already present — leaving as-is.")
        sys.exit(0)

    jobs.append(job)
    data["jobs"] = jobs
    data["updated_at"] = datetime.now(timezone.utc).isoformat()

    tmp = JOBS_FILE + ".tmp"
    with open(tmp, "w") as fh:
        json.dump(data, fh, indent=2)
    os.replace(tmp, JOBS_FILE)
    os.chmod(JOBS_FILE, 0o600)
    os.chmod(os.path.dirname(JOBS_FILE), 0o700)
    print("[seed-sms-cron] Seeded agentphone-sms-auto-responder (every 1m, deliver local).")
  mode: '0755'
  when: build
