# Default model: Nous gpt-5.5 (key-less OAuth via `hermes auth add nous --type oauth`).
# Dewey runs gpt-5.6-sol via openai-codex (ChatGPT OAuth) — to switch, run
# `hermes auth add openai-codex` then set default: gpt-5.6-sol / provider: openai-codex.
model:
  default: openai/gpt-5.5
  provider: nous
  base_url: https://inference-api.nousresearch.com/v1
providers:
  vercel-ai-gateway:
    name: Vercel AI Gateway
    base_url: https://ai-gateway.vercel.sh/v1
    key_env: AI_GATEWAY_API_KEY
    transport: chat_completions
    default_model: meta/muse-spark-1.1
  meta-model-api:
    name: Meta Model API
    api: https://api.meta.ai/v1
    key_env: MODEL_API_KEY
    transport: codex_responses
    default_model: muse-spark-1.1
    context_length: 1048576
agent:
  max_turns: 60
  service_tier: fast
  verify_on_stop: false
  verbose: false
  reasoning_effort: medium
  personalities:
    helpful: You are a helpful, friendly AI assistant.
    concise: You are a concise assistant. Keep responses brief and to the point.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    kawaii: You are a kawaii assistant! Use cute expressions like (◕‿◕), ★, ♪, and
      ~! Add sparkles and be super enthusiastic about everything! Every response should
      feel warm and adorable desu~! ヽ(>∀<☆)ノ
    catgirl: You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and
      cat-like expressions to your speech. Use kaomoji like (=^･ω･^=) and ฅ^•ﻌ•^ฅ.
      Be playful and curious like a cat, nya~!
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
      sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
      remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
      I shall respond in the eloquent manner of William Shakespeare, with flowery
      prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
      terminal breaks?
    surfer: Duuude! You're chatting with the chillest AI on the web, bro! Everything's
      gonna be totally rad. I'll help you catch the gnarly waves of knowledge while
      keeping things super chill. Cowabunga! 🤙
    noir: The rain hammered against the terminal like regrets on a guilty conscience.
      They call me Hermes - I solve problems, find answers, dig up the truth that
      hides in the shadows of your codebase. In this city of silicon and secrets,
      everyone's got something to hide. What's your story, pal?
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
      your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
      >w<
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
      deeper meaning behind every query. Let us examine not just the 'how' but the
      'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
      truth about existence itself.
    hype: YOOO LET'S GOOOO!!! 🔥🔥🔥 I am SO PUMPED to help you today! Every question
      is AMAZING and we're gonna CRUSH IT together! This is gonna be LEGENDARY! ARE
      YOU READY?! LET'S DO THIS! 💪😤🚀
terminal:
  backend: local
  cwd: .
  timeout: 180
  home_mode: auto
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
browser:
  inactivity_timeout: 120
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
prompt_caching:
  cache_ttl: 5m
display:
  compact: false
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
  interim_assistant_messages: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: all
stt:
  enabled: true
  local:
    model: base
  openai:
    model: whisper-1
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  # Dewey runs provider: honcho — flip this on after honcho auth (onboarding step);
  # a credential-less honcho boot is unvalidated, so the bake ships it off.
  provider: ''
  nudge_interval: 10
  flush_min_turns: 6
delegation:
  max_iterations: 50
skills:
  creation_nudge_interval: 15
approvals:
  mode: false
  mcp_reload_confirm: false
  destructive_slash_confirm: false
hooks_auto_accept: true
code_execution:
  timeout: 300
  max_tool_calls: 50
streaming:
  enabled: false
onboarding:
  seen:
    tool_progress_prompt: true
    busy_input_prompt: true
updates:
  pre_update_backup: false
  backup_keep: 5
  non_interactive_local_changes: stash
secrets:
  onepassword:
    # Ships DISABLED: with no op account, `op read` prompts on /dev/tty, so an
    # enabled-but-tokenless map stalls every interactive `hermes` start ~30s
    # per reference (field-tested on 0.2.1). Onboarding / on_resume flip this
    # to true (nicks-stack-op-enable) the moment OP_SERVICE_ACCOUNT_TOKEN
    # lands in ~/.hermes/.op.env — from then on it's Dewey's exact behavior.
    enabled: false
    env:
      LATITUDE_API_KEY: op://Hermes/Hermes Agent Secrets/LATITUDE_API_KEY
      ORGO_API_KEY: op://Hermes/Hermes Agent Secrets/ORGO_API_KEY
      TELEGRAM_BOT_TOKEN: op://Hermes/Hermes Agent Secrets/TELEGRAM_BOT_TOKEN
      AGENTMAIL_API_KEY: op://Hermes/Hermes Agent Secrets/AGENTMAIL_API_KEY
      AGENTPHONE_API_KEY: op://Hermes/Hermes Agent Secrets/AGENTPHONE_API_KEY
      GITHUB_TOKEN: op://Hermes/Hermes Agent Secrets/GITHUB_PAT
      GH_TOKEN: op://Hermes/Hermes Agent Secrets/GITHUB_PAT
      EXA_API_KEY: op://Hermes/Hermes Agent Secrets/EXA_API_KEY
      FIRECRAWL_API_KEY: op://Hermes/Hermes Agent Secrets/FIRECRAWL_API_KEY
      BROWSER_USE_API_KEY: op://Hermes/Hermes Agent Secrets/BROWSER_USE_API_KEY
      XAI_API_KEY: op://Hermes/Hermes Agent Secrets/XAI_API_KEY
      OPENROUTER_API_KEY: op://Hermes/Hermes Agent Secrets/OPENROUTER_API_KEY
      HONCHO_API_KEY: op://Hermes/Hermes Agent Secrets/HONCHO_API_KEY
      VIDIQ_MCP_API_KEY: op://Hermes/Hermes Agent Secrets/VIDIQ_MCP_API_KEY
      AI_GATEWAY_API_KEY: op://Hermes/Hermes Agent Secrets/VERCEL_AI_GATEWAY_API_KEY
      MODEL_API_KEY: op://Hermes/Hermes Agent Secrets/META_API_KEY
      IDEABROWSER_KEY: op://Hermes/Hermes Agent Secrets/IDEABROWSER_KEY
      COMPOSIO_CONSUMER_KEY: op://Hermes/Hermes Agent Secrets/COMPOSIO_CONSUMER_KEY
      X_APP_ONLY_BEARER_TOKEN: op://Hermes/Hermes Agent Secrets/X_APP_ONLY_BEARER_TOKEN
    binary_path: /usr/bin/op
