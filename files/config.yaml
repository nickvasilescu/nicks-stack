mcp_servers:
  vidiq:
    url: https://mcp.vidiq.com/mcp
    headers:
      Authorization: Bearer ${VIDIQ_MCP_API_KEY}
    enabled: true
    connect_timeout: 60.0
  latitude:
    url: https://api.latitude.so/v1/mcp
    enabled: true
    headers:
      Authorization: Bearer ${LATITUDE_API_KEY}
  orgo:
    command: npx
    args:
      - -y
      - github:nickvasilescu/orgo-mcp
    env:
      ORGO_API_KEY: ${ORGO_API_KEY}
      ORGO_DEFAULT_COMPUTER_ID: ${ORGO_DEFAULT_COMPUTER_ID}
    enabled: true
  composio:
    url: https://connect.composio.dev/mcp
    enabled: true
    headers:
      x-consumer-api-key: ${COMPOSIO_CONSUMER_KEY}
  agentmail:
    url: https://mcp.agentmail.to/mcp
    enabled: true
    headers:
      x-api-key: ${AGENTMAIL_API_KEY}
  agentphone:
    command: npx
    args:
      - -y
      - agentphone-mcp
    env:
      AGENTPHONE_API_KEY: ${AGENTPHONE_API_KEY}
      AGENTPHONE_BASE_URL: https://api.agentphone.ai
    enabled: true
  agent-cards:
    url: https://mcp.agentcard.sh/mcp
    auth: oauth
    enabled: true
  x-docs:
    url: https://docs.x.com/mcp
    connect_timeout: 60.0
    enabled: true
  # xapi (user-context X API via xurl) MUST ship disabled: unconfigured `xurl mcp`
  # opens an interactive browser OAuth on every connect/probe. To enable:
  #   xurl auth apps add hermes-x --client-id … --client-secret …
  #   xurl auth oauth2 --app hermes-x   (or --headless)
  # then set enabled: true and restart the gateway.
  xapi:
    command: xurl
    args:
      - --app
      - hermes-x
      - mcp
      - https://api.x.com/mcp
    connect_timeout: 300.0
    enabled: false
  xapi-app-only:
    url: https://api.x.com/mcp
    headers:
      Authorization: Bearer ${X_APP_ONLY_BEARER_TOKEN}
    enabled: true
    connect_timeout: 120
  linear:
    url: https://mcp.linear.app/mcp
    auth: oauth
    enabled: true
  ideabrowser:
    url: https://www.ideabrowser.com/api/mcp/mcp?key=${IDEABROWSER_KEY}
    connect_timeout: 60.0
    enabled: true
  obsidian-vault:
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-filesystem'
      - /root/Documents/HermesVault
    enabled: true
